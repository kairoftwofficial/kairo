<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGMI Tournaments</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    color: white;
    text-align: center;
    background: black;
    overflow-x: hidden;
}

/* 🔥 ANIMATED BG */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 40%);
    animation: moveBg 8s linear infinite;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 50%);
    animation: moveBg2 12s linear infinite;
    z-index: -3;
}

@keyframes moveBg {
    0% { transform: translate(-10%, -10%); }
    50% { transform: translate(-20%, -15%); }
    100% { transform: translate(-10%, -10%); }
}

@keyframes moveBg2 {
    0% { transform: translate(0%, 0%); }
    50% { transform: translate(-15%, -10%); }
    100% { transform: translate(0%, 0%); }
}

/* ❌ CLOSE BUTTON */
.close-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 40px;
    color: red;
    text-decoration: none;
    transition: 0.3s;
}

.close-btn:hover {
    transform: scale(1.2) rotate(90deg);
    color: white;
    text-shadow: 0 0 20px red;
}

/* HEADER */
header {
    padding: 25px;
    font-size: 30px;
    color: red;
    text-shadow: 0 0 20px red;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    border: 2px solid red;
    padding: 25px;
    border-radius: 12px;
    transition: 0.4s;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    width: 150%;
    height: 150%;
    background: linear-gradient(120deg, transparent, rgba(255,0,0,0.4), transparent);
    top: -100%;
    left: -100%;
    transition: 0.6s;
}

.card:hover::before {
    top: 100%;
    left: 100%;
}

.card:hover {
    transform: scale(1.07);
    box-shadow: 0 0 40px red;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: red;
}
</style>
</head>

<body>

<a href="index.html" class="close-btn">&times;</a>

<header>BGMI TOURNAMENTS</header>

<div class="grid">

<div class="card">
<h2>Weekly Scrims</h2>
<p>Every week practice matches</p>
<a href="register.html"><button class="btn">Join Now</button></a>
</div>

<div class="card">
<h2>Saturday Blast</h2>
<p>Weekend intense battles</p>
<a href="saturday.html"><button class="btn">Join Now</button></a>
</div>

<div class="card">
<h2>Sunday Blast</h2>
<p>End the week with action</p>
<a href="sunday.html"><button class="btn">Join Now</button></a>
</div>

<div class="card">
<h2>TDM 1v1</h2>
<p>Test your aim skills</p>
<a href="tdm.html"><button class="btn">Join Now</button></a>
</div>

<div class="card">
<h2>Prize Pool Match</h2>
<p>Win real rewards</p>
<a href="comingsoon.html"><button class="btn">Join Now</button></a>
</div>

</div>

</body>
</html>
