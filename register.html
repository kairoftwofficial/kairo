<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Scrims Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    background: black;
    color: white;
    text-align: center;
}

/* Animated BG */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 40%);
    animation: moveBg 10s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    50% { transform: translate(-20%, -15%); }
}

/* CLOSE */
.close-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 40px;
    color: red;
    text-decoration: none;
}

/* FORM BOX */
.form-box {
    max-width: 420px;
    margin: 70px auto;
    padding: 25px;
    border: 2px solid red;
    border-radius: 12px;
    box-shadow: 0 0 30px red;
    background: rgba(0,0,0,0.6);
}

h2 {
    color: red;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    background: #111;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
}
</style>
</head>

<body>

<a href="tournaments.html" class="close-btn">&times;</a>

<div class="form-box">
<h2>🔥 Weekly Scrims Registration</h2>

<form id="regForm">
<input type="text" name="Team Name" placeholder="Team Name" required>
<input type="text" name="Player 1" placeholder="Player 1" required>
<input type="text" name="Player 2" placeholder="Player 2" required>
<input type="text" name="Player 3" placeholder="Player 3" required>
<input type="text" name="Player 4" placeholder="Player 4" required>
<input type="number" name="Email ID" placeholder="Phone No." required>

<button type="submit">Register</button>
</form>

<p id="msg"></p>
</div>

<script>
const form = document.getElementById("regForm");
const msg = document.getElementById("msg");

const API_URL = "https://sheetdb.io/api/v1/7bu51pt2n25n2";

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.innerText = "⏳ Submitting...";

    const data = new FormData(form);
    const obj = Object.fromEntries(data);

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ data: obj }),
            headers: { "Content-Type": "application/json" }
        });

        msg.innerText = "✅ Registered Successfully!";
        form.reset();
    } catch {
        msg.innerText = "❌ Error!";
    }
});
</script>

</body>
</html>
