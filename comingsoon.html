<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* 🔥 Animated BG */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 40%);
    animation: moveBg 8s linear infinite;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,0,0.1), transparent 50%);
    animation: moveBg2 12s linear infinite;
    z-index: -3;
}

@keyframes moveBg {
    50% { transform: translate(-20%, -15%); }
}

@keyframes moveBg2 {
    50% { transform: translate(-15%, -10%); }
}

/* ❌ Close Button */
.close-btn {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 40px;
    color: red;
    text-decoration: none;
    transition: 0.3s;
}

.close-btn:hover {
    transform: scale(1.2) rotate(90deg);
    color: white;
    text-shadow: 0 0 20px red;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TEXT */
h1 {
    font-size: 60px;
    color: red;
    text-shadow: 0 0 25px red;
    animation: glow 2s infinite alternate;
}

p {
    margin-top: 10px;
    color: #ccc;
}

/* Glow Animation */
@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 40px red; }
}

/* Loading dots */
.loading {
    margin-top: 20px;
    font-size: 25px;
    letter-spacing: 5px;
}

.loading span {
    animation: blink 1.5s infinite;
}

.loading span:nth-child(2) {
    animation-delay: 0.3s;
}

.loading span:nth-child(3) {
    animation-delay: 0.6s;
}

@keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>

<body>

<a href="tournaments.html" class="close-btn">&times;</a>

<div class="container">
    <h1>COMING SOON</h1>
    <p>Prize tournament is on the way 🔥</p>

    <div class="loading">
        <span>.</span><span>.</span><span>.</span>
    </div>
</div>

</body>
</html>
